<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SQL Assistant — Preview. Understand. Never Break.</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Courier New', monospace; }
  .mono { font-family: 'Courier New', monospace; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #333; }
  .pulse-danger { animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body class="bg-black text-white min-h-screen">

<header class="border-b border-white/20 px-6 py-4 flex justify-between items-center">
  <div>
    <h1 class="text-xl font-bold tracking-tight">SQL ASSISTANT</h1>
    <p class="text-xs text-white/50">Preview. Understand. Never Break.</p>
  </div>
  <div id="projectBadge" class="text-xs text-white/40">No project loaded</div>
</header>

<main class="grid grid-cols-3 gap-4 p-6">

  <!-- LEFT: Upload + Schema -->
  <section class="border border-white/20 p-4 rounded">
    <h2 class="font-bold mb-3">1. Upload Database</h2>
    <input type="file" id="dbfile" accept=".db,.sqlite,.sqlite3" class="text-xs mb-3 w-full">
    <button onclick="uploadDb()" class="w-full bg-white text-black py-2 rounded font-bold text-sm hover:bg-white/80">Upload</button>
    <div id="schemaBox" class="mt-4 text-xs text-white/70 space-y-2"></div>
  </section>

  <!-- MIDDLE: Query editor + results -->
  <section class="border border-white/20 p-4 rounded col-span-1">
    <h2 class="font-bold mb-3">2. Run Query (safe — always rolled back)</h2>
    <textarea id="sqlInput" rows="5" class="w-full bg-black border border-white/30 rounded p-2 text-sm mono"
      placeholder="SELECT * FROM users LIMIT 10;"></textarea>
    <button onclick="runQuery()" class="w-full mt-2 bg-white text-black py-2 rounded font-bold text-sm hover:bg-white/80">Run</button>

    <div id="riskBox" class="mt-3 text-xs"></div>
    <div id="resultBox" class="mt-3 text-xs overflow-x-auto"></div>
  </section>

  <!-- RIGHT: Memory chat -->
  <section class="border border-white/20 p-4 rounded flex flex-col">
    <h2 class="font-bold mb-3">3. Ask Memory (persists across sessions)</h2>
    <div id="chatLog" class="flex-1 text-xs space-y-2 overflow-y-auto mb-3" style="max-height:340px;"></div>
    <div class="flex gap-2">
      <input id="chatInput" class="flex-1 bg-black border border-white/30 rounded p-2 text-xs" placeholder="What did we do last session?">
      <button onclick="askChat()" class="bg-white text-black px-3 rounded text-xs font-bold">Ask</button>
    </div>
  </section>

</main>

<script>
let projectId = localStorage.getItem("project_id") || null;
if (projectId) {
  document.getElementById("projectBadge").innerText = "Project: " + projectId + " (restored)";
  loadMemorySummary();
}

async function uploadDb() {
  const f = document.getElementById("dbfile").files[0];
  if (!f) return alert("Choose a .db file first");
  const form = new FormData();
  form.append("dbfile", f);
  const res = await fetch("/api/upload", { method: "POST", body: form });
  const data = await res.json();
  if (data.error) return alert(data.error);

  projectId = data.project_id;
  localStorage.setItem("project_id", projectId);
  document.getElementById("projectBadge").innerText = "Project: " + projectId;

  const box = document.getElementById("schemaBox");
  box.innerHTML = "";
  for (const [table, info] of Object.entries(data.schema)) {
    box.innerHTML += `<div class="border border-white/10 p-2 rounded">
      <div class="font-bold">${table} <span class="text-white/40">(${info.row_count} rows)</span></div>
      <div class="text-white/50">${info.columns.map(c => c.name).join(", ")}</div>
    </div>`;
  }
}

async function runQuery() {
  if (!projectId) return alert("Upload a database first");
  const sql = document.getElementById("sqlInput").value;
  const res = await fetch("/api/run", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ project_id: projectId, sql })
  });
  const data = await res.json();

  const riskBox = document.getElementById("riskBox");
  const colors = { safe: "text-green-400", caution: "text-yellow-400", danger: "text-red-400" };
  if (data.risk) {
    const cls = colors[data.risk.level] || "text-white";
    const pulse = data.risk.level === "danger" ? "pulse-danger" : "";
    riskBox.innerHTML = `<div class="${cls} ${pulse} font-bold">[${data.risk.level.toUpperCase()}] ${data.risk.reason}</div>`;
  }

  const resultBox = document.getElementById("resultBox");
  if (data.error) {
    resultBox.innerHTML = `<div class="text-red-400">Error: ${data.error}</div>`;
    return;
  }

  resultBox.innerHTML = `<div class="text-white/50 mb-2">${data.note}</div>`;
  if (data.result.columns.length) {
    let table = `<table class="w-full text-xs border border-white/10"><thead><tr>`;
    data.result.columns.forEach(c => table += `<th class="border border-white/10 p-1 text-left">${c}</th>`);
    table += `</tr></thead><tbody>`;
    data.result.rows.forEach(row => {
      table += `<tr>` + row.map(v => `<td class="border border-white/10 p-1">${v}</td>`).join("") + `</tr>`;
    });
    table += `</tbody></table>`;
    resultBox.innerHTML += table;
  } else {
    resultBox.innerHTML += `<div>${data.result.rowcount} row(s) affected (rolled back — nothing was saved).</div>`;
  }
}

async function askChat() {
  if (!projectId) return alert("Upload a database first");
  const input = document.getElementById("chatInput");
  const question = input.value.trim();
  if (!question) return;
  input.value = "";

  const log = document.getElementById("chatLog");
  log.innerHTML += `<div class="text-white/70"><b>You:</b> ${question}</div>`;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ project_id: projectId, question })
  });
  const data = await res.json();
  log.innerHTML += `<div class="text-green-300 whitespace-pre-wrap"><b>Assistant:</b> ${data.answer}</div>`;
  log.scrollTop = log.scrollHeight;
}

async function loadMemorySummary() {
  const res = await fetch(`/api/memory/${projectId}`);
  const mem = await res.json();
  if (mem.schema) {
    const box = document.getElementById("schemaBox");
    for (const [table, info] of Object.entries(mem.schema.tables || {})) {
      box.innerHTML += `<div class="border border-white/10 p-2 rounded">
        <div class="font-bold">${table} <span class="text-white/40">(${info.row_count} rows)</span></div>
        <div class="text-white/50">${info.columns.map(c => c.name).join(", ")}</div>
      </div>`;
    }
  }
}
</script>

</body>
</html>
